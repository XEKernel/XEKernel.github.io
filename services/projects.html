<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开源项目集 - XEKernel</title>
    <link rel="icon" href="../images/profile.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- 粒子背景容器 -->
    <div id="particles-js"></div>

    <!-- 动态背景装饰 -->
    <div class="bg-decoration">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
    </div>

    <!-- 导航栏 -->
    <nav id="mainNav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-atom"></i>
                <span>XEKernel</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="navLink"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="../index.html#github" class="navLink"><i class="fab fa-github"></i> GitHub</a></li>
                <li><a href="../index.html#tools" class="navLink"><i class="fas fa-tools"></i> 工具</a></li>
                <li><a href="../index.html#contact" class="navLink"><i class="fas fa-address-card"></i> 联系</a></li>
                <li><a href="../UpdateLog.html" class="navLink"><i class="fas fa-history"></i> 日志</a></li>
                <li><a href="serve.html" class="navLink"><i class="fas fa-cogs"></i> 服务</a></li>
            </ul>
            <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换深色/浅色模式">◐</button>
            <div class="menu-toggle" id="mobileMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- 项目列表 -->
    <section>
        <div class="section-content">
            <a href="serve.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回服务列表</a>
            <div class="section-header">
                <h2><i class="fas fa-code-branch"></i> 开源项目集</h2>
                <p>
                    <i class="fas fa-info-circle"></i> 所有开源项目，按编程语言分类展示
                </p>
            </div>
            
            <!-- 语言筛选器 -->
            <div class="filter-buttons" id="filterContainer">
                <button class="filter-btn active" data-language="all">
                    <i class="fas fa-globe"></i> 全部
                </button>
            </div>
            
            <!-- 搜索框 -->
            <div class="search-container">
                <input type="text" 
                       id="searchInput" 
                       class="search-input"
                       placeholder="搜索项目名称、描述..."
                       onkeyup="filterProjects()">
            </div>
            
            <!-- 统计信息 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-number" id="totalProjects">0</div>
                    <div class="stat-label">总项目数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="visibleProjects">0</div>
                    <div class="stat-label">显示项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalStars">0</div>
                    <div class="stat-label">总星标</div>
                </div>
            </div>
            
            <!-- 加载状态 -->
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>正在从GitHub加载项目信息...</p>
            </div>
            
            <!-- 项目列表 -->
            <div class="projects-grid" id="projects"></div>
        </div>
    </section>
    
    <!-- 粒子效果库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/particles.js/2.0.0/particles.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js'"></script>
    <script src="../js/script.js"></script>
    <script>
        const GITHUB_USER = 'XEKernel';
        let allProjects = [];
        let currentFilter = 'all';
        
        // 语言颜色映射
        const languageColors = {
            'Python': '#3776AB',
            'C#': '#9B4DCA',
            'JavaScript': '#F7DF1E',
            'HTML': '#E34F26',
            'CSS': '#1572B6',
            'TypeScript': '#3178C6',
            'Java': '#007396',
            'Go': '#00ADD8',
            'Rust': '#000000',
            'PHP': '#777BB4',
            'Ruby': '#CC342D',
            'Swift': '#F05138',
            'Kotlin': '#A97BFF',
            'C++': '#00599C',
            'C': '#A8B9CC',
            'Shell': '#89E051',
            'Vue': '#4FC08D',
            'React': '#61DAFB'
        };
        
        // 获取所有项目
        async function fetchProjects() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&type=owner`);
                const repos = await response.json();
                
                // 过滤掉已归档的和fork的项目
                allProjects = repos.filter(repo => 
                    !repo.archived && 
                    !repo.fork
                );
                
                // 更新筛选器按钮
                updateFilterButtons();
                
                // 显示项目
                filterProjects();
                
                // 更新统计信息
                updateStats();
                
            } catch (error) {
                console.error('Error fetching projects:', error);
                document.getElementById('loading').innerHTML = 
                    '<div class="no-results"><i class="fas fa-exclamation-circle"></i><h3>无法获取项目信息</h3><p>请刷新页面重试</p></div>';
            }
        }
        
        // 更新筛选器按钮
        function updateFilterButtons() {
            const filterContainer = document.getElementById('filterContainer');
            const languages = [...new Set(allProjects.map(repo => repo.language).filter(Boolean))];
            
            languages.forEach(language => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-language', language);
                btn.innerHTML = `<i class="fas fa-code"></i> ${language}`;
                btn.onclick = () => setFilter(language);
                filterContainer.appendChild(btn);
            });
            
            // 为所有按钮添加点击事件
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.onclick = () => setFilter(btn.getAttribute('data-language'));
            });
        }
        
        // 设置筛选器
        function setFilter(language) {
            currentFilter = language;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-language') === language) {
                    btn.classList.add('active');
                }
            });
            
            filterProjects();
        }
        
        // 筛选和搜索项目
        function filterProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredProjects = allProjects.filter(project => {
                const matchesLanguage = currentFilter === 'all' || project.language === currentFilter;
                const matchesSearch = 
                    project.name.toLowerCase().includes(searchTerm) ||
                    (project.description && project.description.toLowerCase().includes(searchTerm));
                
                return matchesLanguage && matchesSearch;
            });
            
            displayProjects(filteredProjects);
            updateStats(filteredProjects);
        }
        
        // 显示项目
        function displayProjects(projects) {
            const container = document.getElementById('projects');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'none';
            container.innerHTML = '';
            
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>没有找到匹配的项目</h3>
                        <p>尝试更改筛选条件或搜索关键词</p>
                    </div>
                `;
                return;
            }
            
            projects.forEach((repo, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                const languageColor = languageColors[repo.language] || '#2563eb';
                
                card.innerHTML = `
                    <h3>${repo.name}</h3>
                    <p>${repo.description || '暂无项目描述'}</p>
                    <div class="project-meta">
                        <span>
                            <i class="fas fa-code"></i>
                            <span class="language-tag" style="background: ${languageColor}">${repo.language || '未指定'}</span>
                        </span>
                        <span>
                            <i class="far fa-star"></i> ${repo.stargazers_count}
                        </span>
                        <span>
                            <i class="fas fa-code-branch"></i> ${repo.forks_count}
                        </span>
                    </div>
                    <button class="service-button" onclick="window.open('${repo.html_url}', '_blank')">
                        <i class="fab fa-github"></i> 查看项目
                    </button>
                `;
                
                container.appendChild(card);
            });
        }
        
        // 更新统计信息
        function updateStats(visibleProjects = null) {
            const projects = visibleProjects || allProjects;
            
            document.getElementById('totalProjects').textContent = allProjects.length;
            document.getElementById('visibleProjects').textContent = projects.length;
            document.getElementById('totalStars').textContent = allProjects.reduce((sum, repo) => sum + repo.stargazers_count, 0);
        }
        
        // 页面加载时获取项目
        window.onload = () => {
            fetchProjects();
        };
    </script>
    
    <footer class="footer">
        <div class="footer-content">
            <p><i class="fas fa-copyright"></i> Copyright &copy; 2024-2026 XEKernel. 保留所有权利</p>
            <p><i class="fas fa-code"></i> 本网站由 XEKernel 设计与开发</p>
            <div class="footer-links">
                <a href="../index.html"><i class="fas fa-home"></i> 返回首页</a>
                <a href="serve.html"><i class="fas fa-cogs"></i> 服务列表</a>
            </div>
        </div>
    </footer>

    <script>
    function toggleTheme() {
        var h = document.documentElement;
        var c = h.getAttribute('data-theme');
        var n = c === 'dark' ? null : 'dark';
        if (n) h.setAttribute('data-theme', n);
        else h.removeAttribute('data-theme');
        localStorage.setItem('theme', n || 'light');
    }
    (function() {
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
    </script>
</body>
</html>
