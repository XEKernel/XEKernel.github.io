</head>

        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
    </div>

    <!-- 导航栏 -->
    <nav id="mainNav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-atom"></i>
                <span>XEKernel</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="navLink"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="../index.html#github" class="navLink"><i class="fab fa-github"></i> GitHub</a></li>
                <li><a href="../index.html#tools" class="navLink"><i class="fas fa-tools"></i> 工具</a></li>
                <li><a href="../index.html#contact" class="navLink"><i class="fas fa-address-card"></i> 联系</a></li>
                <li><a href="../UpdateLog.html" class="navLink"><i class="fas fa-history"></i> 日志</a></li>
                <li><a href="serve.html" class="navLink"><i class="fas fa-cogs"></i> 服务</a></li>
            </ul>
            <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换深色/浅色模式">◐</button>
            <div class="menu-toggle" id="mobileMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- 返回服务列表链接 -->
    <section>
        <div class="section-content">
            <a href="serve.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回服务列表</a>
            <h1><i class="fab fa-microsoft"></i> C# 开源项目集</h1>
            
            <div class="search-container">
                <input type="text" 
                       id="searchInput" 
                       placeholder="搜索项目名称..."
                       onkeyup="filterProjects()">
            </div>
            
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>正在加载项目信息...</p>
            </div>
            <div class="projects-grid" id="projects"></div>
        </div>
    </section>
    
    <!-- 粒子效果库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/particles.js/2.0.0/particles.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js'"></script>
    <script src="../js/script.js"></script>
    <script>
        const GITHUB_USER = 'SYSTEM-MEMZ-XEK';
        const LANGUAGE_FILTER = 'C#';

        async function fetchProjects() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos`);
                const repos = await response.json();
                
                // 获取每个仓库的最新release
                const reposWithReleases = await Promise.all(
                    repos.map(async repo => {
                        try {
                            const releaseRes = await fetch(repo.releases_url.replace('{/id}', ''));
                            const releases = await releaseRes.json();
                            return {
                                ...repo,
                                latestRelease: releases[0] || null
                            };
                        } catch {
                            return { ...repo, latestRelease: null };
                        }
                    })
                );

                const filteredRepos = reposWithReleases.filter(repo => 
                    repo.language === LANGUAGE_FILTER && 
                    !repo.archived && 
                    !repo.fork
                );

                displayProjects(filteredRepos);
            } catch (error) {
                document.getElementById('loading').innerHTML = 
                    '<p>无法获取项目信息，请刷新重试</p>';
            }
        }

        function displayProjects(repos) {
            const container = document.getElementById('projects');
            container.innerHTML = '';
            
            if (repos.length === 0) {
                container.innerHTML = '<p>暂无C#开源项目</p>';
                return;
            }

            repos.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${repo.name}</h3>
                    <p>${repo.description || '暂无项目描述'}</p>
                    <div class="project-meta">
                        <span>
                            <i class="fas fa-code"></i>
                            <span class="language-tag">${repo.language || '未指定'}</span>
                        </span>
                        <span>
                            <i class="far fa-star"></i> ${repo.stargazers_count}
                        </span>
                    </div>
                    <div class="button-group">
                        <a href="${repo.html_url}" class="github-button" target="_blank">
                            查看仓库
                        </a>
                        ${repo.latestRelease 
                            ? `<a href="${repo.latestRelease.zipball_url}" 
                                class="github-button download-button"
                                download="${repo.name}-${repo.latestRelease.tag_name}.zip">
                                下载 (${repo.latestRelease.tag_name})
                              </a>`
                            : '<button class="github-button download-button" disabled>暂无发布版本</button>'}
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('loading').style.display = 'none';
        }

        // 项目搜索功能
        function filterProjects() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const cards = document.getElementsByClassName('project-card');

            Array.from(cards).forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                card.style.display = title.includes(filter) ? 'block' : 'none';
            });
        }

        window.addEventListener('DOMContentLoaded', fetchProjects);
    </script>

                <a href="serve.html"><i class="fas fa-cogs"></i> 服务列表</a>
            </div>
        </div>
    </footer>
    <script>
    function toggleTheme() {
        var h = document.documentElement;
        var c = h.getAttribute('data-theme');
        var n = c === 'dark' ? null : 'dark';
        if (n) h.setAttribute('data-theme', n);
        else h.removeAttribute('data-theme');
        localStorage.setItem('theme', n || 'light');
    }
    (function() {
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
    </script>
</body>
</html>
